<html lang="ar" dir="rtl">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#fff8ef,#f0e4d6);font-family:"Cairo",system-ui,sans-serif;color:#1a1612;padding:24px}
    .card{max-width:620px;width:100%;background:rgba(255,255,255,.88);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.7);box-shadow:0 20px 50px rgba(0,0,0,.08);border-radius:30px;padding:34px;text-align:center}
    .check{width:82px;height:82px;border-radius:50%;display:grid;place-items:center;margin:0 auto 18px;background:linear-gradient(135deg,#d8a56d,#8c5b37);color:#fff;font-size:40px;font-weight:900}
    h1{font-size:clamp(30px,6vw,48px);margin:0 0 12px}
    p{font-size:18px;line-height:1.9;color:#6a6057;margin:0 0 24px}
    .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    a{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:15px 22px;border-radius:18px;font-weight:900;text-decoration:none}
    .primary{background:linear-gradient(135deg,#d8a56d,#8c5b37);color:#fff}
    .secondary{background:#25d366;color:#fff}
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✓</div>
    <h1>شكراً، تم إرسال الطلب بنجاح</h1>

    <div class="actions">
      <a class="primary" href="index.html">الرجوع للصفحة الرئيسية</a>
      <a class="secondary" href="https://wa.me/212622566694" target="_blank" rel="noopener">التواصل عبر واتساب</a>
    </div>
  </div>
</body>
</html>
